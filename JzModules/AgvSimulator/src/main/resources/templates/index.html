        <div id="mapRoot" class="h-full col-span-10" style="position: relative; width: 100%; height: 100%;">
            <!-- 静态层：地图、网格、节点、边等 -->
            <canvas
                    id="mapCanvasStatic"
                    style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;"
                    class="w-full border border-gray-300 bg-white h-full"
                    @wheel="handleZoom"
                    @mousedown="handleMouseDown"
                    @mousemove="handleMouseMove"
                    @mouseup="handleMouseUp"
                    @click="handleCanvasClick"
                    @contextmenu="handleContextMenu">
            </canvas>

            <!-- 动态层：AGV 图标（透明背景，覆盖在上层） -->
            <canvas
                    id="mapCanvasDynamic"
                    style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;"
                    @wheel="handleDynamicWheel"
                    @mousedown="handleDynamicMouseDown"
                    @mousemove="handleDynamicMouseMove"
                    @mouseup="handleDynamicMouseUp"
                    @click="handleDynamicCanvasClick"
                    @contextmenu.prevent="handleDynamicContextMenu">
            </canvas>
        </div>
    </div>


    <!-- 带动画效果的版本 -->
    <div v-if="contextMenu.visible"
            :style="{
                position: 'fixed',
                top: `${contextMenu.y}px`,
                left: `${contextMenu.x}px`,
                'z-index': 1000
            }"
            class="context-menu bg-white border border-gray-300 rounded-md shadow-lg font-sans text-sm min-w-[150px] transform transition-all duration-100 ease-out"
            :class="{
                'opacity-0 -translate-y-1': !contextMenu.visible,
                'opacity-100 translate-y-0': contextMenu.visible }"
                @click.stop="() => {}">
        <!-- 节点菜单 -->
        <div v-if="contextMenu.targetType === 'node'" class="menu-content">
            <div class="menu-header bg-gray-50 text-gray-600 font-semibold px-3 py-2 border-b border-gray-200 text-xs uppercase tracking-wide">
                节点操作
            </div>
            <div class="menu-item px-3 py-2 cursor-pointer hover:bg-blue-50 hover:text-blue-600 border-b border-gray-100 transition-colors duration-150"
                 @click="handleMoveToNode">
                <div class="flex items-center">
                    <svg class="w-4 h-4 mr-2 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 9l3 3m0 0l-3 3m3-3H8m13 0a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                    移动到目标点
                </div>
            </div>
            <div class="menu-item px-3 py-2 cursor-pointer hover:bg-blue-50 hover:text-blue-600 border-b border-gray-100 transition-colors duration-150"
                 @click="handleSetAsStart">
                <div class="flex items-center">
                    <svg class="w-4 h-4 mr-2 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                    </svg>
                    设为初始位置
                </div>
            </div>
            <div class="menu-item px-3 py-2 cursor-pointer hover:bg-red-50 hover:text-red-600 transition-colors duration-150"
                 @click="handleCloseMenu">
                <div class="flex items-center">
                    <svg class="w-4 h-4 mr-2 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                    关闭
                </div>
            </div>
        </div>

        <!-- 边菜单 -->
        <div v-else-if="contextMenu.targetType === 'edge'" class="menu-content">
            <div class="menu-header bg-gray-50 text-gray-600 font-semibold px-3 py-2 border-b border-gray-200 text-xs uppercase tracking-wide">
                通道操作
            </div>
            <div class="menu-item px-3 py-2 cursor-pointer hover:bg-red-50 hover:text-red-600 transition-colors duration-150"
                 @click="handleCloseMenu">
                <div class="flex items-center">
                    <svg class="w-4 h-4 mr-2 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                    关闭
                </div>
            </div>
        </div>
    </div>
